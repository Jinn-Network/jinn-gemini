# Control API service build configuration
# Pin to nixpkgs archive that includes Node.js 22
[phases.setup]
nixpkgsArchive = "51ad838b03a05b1de6f9f2a0fffecee64a9788ee"

[phases.install]
cmds = ["yarn install --frozen-lockfile"]

[phases.build]
cmds = ["yarn run build"]

[start]
# Rebuild jinn-node at startup because nixpacks adds a final COPY layer
# that overwrites dist/ (gitignored). Also symlink for package resolution.
cmd = "cd jinn-node && yarn build && cd .. && ln -sf /app/jinn-node /app/node_modules/jinn-node && npx tsx control-api/server.ts"
