[build]
builder = "NIXPACKS"
nixpacksConfigPath = "deploy/control-api/nixpacks.toml"
watchPatterns = ["/control-api/**", "/config/**", "/logging/**", "/env/**", "/package.json"]

[deploy]
# Control API is run via tsx (not compiled) for compatibility
startCommand = "export NODE_OPTIONS='--disable-warning=DEP0040' && npx tsx control-api/server.ts"
healthcheckPath = "/health"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
