# Ponder service build configuration
# Pin to nixpkgs archive that includes Node.js 22
[phases.setup]
nixpkgsArchive = "51ad838b03a05b1de6f9f2a0fffecee64a9788ee"

[phases.install]
# Remove workspace directories before install to skip frontend/packages deps.
# Ponder uses root node_modules only — no workspace deps needed.
# This cuts install from ~5min to ~1-2min by skipping Next.js, Storybook, etc.
cmds = ["rm -rf frontend packages && yarn install --frozen-lockfile"]

[phases.build]
# Ponder runs from source via @ponder/core — no jinn-node build needed.
# The old config ran `yarn run build && cd ponder && yarn install` which:
#   1. Built jinn-node (unused by Ponder) — 10s
#   2. Ran a second yarn install without --frozen-lockfile — 4.5min (!)
cmds = ["echo 'Ponder build: no compilation needed'"]

[start]
cmd = "cd ponder && ponder start --port $PORT --schema ${PONDER_SCHEMA_VERSION:-jinn_gemini_v1} --views-schema jinn_gemini_public"
