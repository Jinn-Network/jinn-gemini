[build]
builder = "NIXPACKS"
nixpacksConfigPath = "deploy/ponder/nixpacks.toml"
watchPatterns = ["/ponder/**", "/package.json", "/scripts/patch-dist-imports.js"]

[deploy]
startCommand = "cd ponder && ponder start --port $PORT --schema ${PONDER_SCHEMA_VERSION:-jinn_gemini_v1} --views-schema ${PONDER_VIEWS_SCHEMA:-jinn_gemini_public}"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
