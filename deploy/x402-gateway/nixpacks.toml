# x402 Gateway service build configuration
# Pin to nixpkgs archive that includes Node.js 22
[phases.setup]
nixpkgsArchive = "51ad838b03a05b1de6f9f2a0fffecee64a9788ee"

[phases.install]
# Install root deps then x402-gateway deps
cmds = ["yarn install --frozen-lockfile", "cd services/x402-gateway && yarn install --frozen-lockfile"]

[phases.build]
# Skip tsc build - tsx compiles on-the-fly at runtime
# (x402-gateway imports from parent dirs which aren't in its tsconfig)
cmds = ["echo 'Skipping tsc - using tsx runtime'"]

[start]
cmd = "cd services/x402-gateway && npx tsx index.ts"
