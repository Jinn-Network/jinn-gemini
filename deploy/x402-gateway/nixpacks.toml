# x402 Gateway service build configuration
# Pin to nixpkgs archive that includes Node.js 22
[phases.setup]
nixpkgsArchive = "51ad838b03a05b1de6f9f2a0fffecee64a9788ee"
aptPkgs = ["python3"]

[phases.install]
cmds = ["yarn install --frozen-lockfile"]

[phases.build]
cmds = ["cd jinn-node && yarn build"]

[start]
cmd = "ln -sf /app/jinn-node /app/node_modules/jinn-node && npx tsx services/x402-gateway/index.ts"
