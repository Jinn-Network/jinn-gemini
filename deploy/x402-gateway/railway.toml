[build]
builder = "NIXPACKS"
nixpacksConfigPath = "deploy/x402-gateway/nixpacks.toml"
watchPatterns = ["/services/x402-gateway/**", "/scripts/shared/**", "/jinn-node/src/**", "/jinn-node/package.json", "/package.json", "/deploy/x402-gateway/**"]

[deploy]
startCommand = "cd jinn-node && yarn build && cd .. && ln -sf /app/jinn-node /app/node_modules/jinn-node && npx tsx services/x402-gateway/index.ts"
healthcheckPath = "/health"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
