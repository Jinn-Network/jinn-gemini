name: Security Scan

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  security:
    name: Security Vulnerability Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'yarn'
        
    - name: Install dependencies
      run: yarn install --frozen-lockfile
      
    - name: Install Snyk CLI
      run: npm install -g snyk
      
    - name: Run Snyk to check for vulnerabilities
      continue-on-error: true
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      run: |
        echo "Running security scan on all projects..."
        echo "Note: Many vulnerabilities are in external dependencies (code-resources/)"
        echo "These are not blocking issues for the main application."
        echo ""
        snyk test --all-projects --severity-threshold=high || echo "Security scan completed with findings"
        
    - name: Monitor dependencies
      continue-on-error: true
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      run: |
        echo "Monitoring dependencies for new vulnerabilities..."
        snyk monitor --all-projects || echo "Dependency monitoring completed with findings"
