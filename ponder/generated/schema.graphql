type Query {
  request(id: String!): request
  requests(where: requestFilter, orderBy: String, orderDirection: String, before: String, after: String, limit: Int): requestPage!
  delivery(id: String!): delivery
  deliverys(where: deliveryFilter, orderBy: String, orderDirection: String, before: String, after: String, limit: Int): deliveryPage!
  _meta: _meta
}

type request {
  id: String!
  mech: String!
  sender: String!
  ipfsHash: String
  transactionHash: String
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  delivered: Boolean!
}

scalar BigInt

type requestPage {
  items: [request!]!
  pageInfo: PageInfo!
}

type PageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
  endCursor: String
}

