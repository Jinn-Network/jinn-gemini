type Query {
  jobDefinition(id: String!): jobDefinition
  jobDefinitions(where: jobDefinitionFilter, orderBy: String, orderDirection: String, before: String, after: String, limit: Int): jobDefinitionPage!
  request(id: String!): request
  requests(where: requestFilter, orderBy: String, orderDirection: String, before: String, after: String, limit: Int): requestPage!
  delivery(id: String!): delivery
  deliverys(where: deliveryFilter, orderBy: String, orderDirection: String, before: String, after: String, limit: Int): deliveryPage!
  artifact(id: String!): artifact
  artifacts(where: artifactFilter, orderBy: String, orderDirection: String, before: String, after: String, limit: Int): artifactPage!
  message(id: String!): message
  messages(where: messageFilter, orderBy: String, orderDirection: String, before: String, after: String, limit: Int): messagePage!
  _meta: _meta
}

