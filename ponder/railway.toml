[build]
builder = "NIXPACKS"
nixpacksConfigPath = "ponder/nixpacks.toml"
watchPatterns = ["/ponder/**", "/package.json", "/scripts/patch-dist-imports.js"]

[deploy]
startCommand = "cd ponder && ponder start --port $PORT --schema $RAILWAY_DEPLOYMENT_ID --views-schema jinn_gemini_public"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
