[build]
builder = "NIXPACKS"
nixpacksConfigPath = "worker/nixpacks.toml"

[deploy]
# NODE_OPTIONS: --disable-warning=DEP0040 suppresses punycode deprecation from dependencies
startCommand = "NODE_OPTIONS='--disable-warning=DEP0040' npx tsx control-api/server.ts & sleep 3 && NODE_OPTIONS='--disable-warning=DEP0040' node dist/worker/mech_worker.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
