services:
  worker:
    build: .
    image: jinn-node:latest
    container_name: jinn-worker
    restart: unless-stopped

    env_file:
      - .env

    environment:
      - GEMINI_SANDBOX=false
      - HOME=/home/jinn
      - OPERATE_PROFILE_DIR=/home/jinn/.operate
      - JINN_WORKSPACE_DIR=/app/jinn-repos

    volumes:
      # Bind mount host .operate/ (keys, wallets, service configs created by yarn setup)
      - ./.operate:/home/jinn/.operate
      # Bind mount host .gemini/ (Gemini CLI OAuth creds)
      - ${HOME}/.gemini:/home/jinn/.gemini
      # Cached venture repo clones (ephemeral, saves re-clone time)
      - jinn-repos:/app/jinn-repos

    # Chrome requires more than the default 64MB shared memory
    shm_size: "2gb"

    ports:
      - "8080:8080"

    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8080/health').then(r=>{if(r.ok)process.exit(0);else process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3

    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G

    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  jinn-repos:
