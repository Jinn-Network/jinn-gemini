apiVersion: v1
kind: Service
metadata:
  labels:
    run: abci0
  name: abci0
spec:
  ports:
  - name: tcp1
    port: 26656
    protocol: TCP
  - name: tcp2
    port: 26657
    protocol: TCP
  selector:
    app: agent-svc
    instance: agent-node-0

