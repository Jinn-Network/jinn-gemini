# Local Nango for credential bridge development/testing
# Run: docker compose -f docker-compose.nango.yml up -d
# Dashboard: http://localhost:3003

services:
  nango-db:
    image: postgres:16.0-alpine
    container_name: nango-db
    environment:
      POSTGRES_DB: nango
      POSTGRES_USER: nango
      POSTGRES_PASSWORD: nango
    ports:
      - "5434:5432"
    volumes:
      - nango-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nango"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - nango

  nango-server:
    image: nangohq/nango-server:latest
    container_name: nango-server
    restart: unless-stopped
    depends_on:
      nango-db:
        condition: service_healthy
    ports:
      - "3003:3003"
    environment:
      - NANGO_DB_HOST=nango-db
      - NANGO_DB_PORT=5432
      - NANGO_DB_USER=nango
      - NANGO_DB_PASSWORD=nango
      - NANGO_DB_NAME=nango
      - NANGO_DB_SSL=false
      - NANGO_ENCRYPTION_KEY=${NANGO_ENCRYPTION_KEY:-}
      - NANGO_SECRET_KEY_DEV=${NANGO_SECRET_KEY_DEV:-cd4de0cb-a496-4905-9fc1-e3610d9c2035}
      - NANGO_PUBLIC_KEY_DEV=${NANGO_PUBLIC_KEY_DEV:-d7abda1b-bc04-4ac8-a199-b948fc855870}
      - NANGO_CALLBACK_URL=http://127.0.0.1:3003/oauth/callback
      - NANGO_LOGS_ENABLED=false
      - SERVER_PORT=3003
      - NANGO_SERVER_URL=http://127.0.0.1:3003
      - NANGO_DASHBOARD_USERNAME=${NANGO_DASHBOARD_USERNAME:-admin}
      - NANGO_DASHBOARD_PASSWORD=${NANGO_DASHBOARD_PASSWORD:-admin}
    networks:
      - nango

  nango-redis:
    image: redis:7.2-alpine
    container_name: nango-redis
    ports:
      - "6380:6379"
    networks:
      - nango

networks:
  nango:
    driver: bridge

volumes:
  nango-data:
