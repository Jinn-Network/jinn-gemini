  messages(where: messageFilter, orderBy: String, orderDirection: String, before: String, after: String, limit: Int, offset: Int): messagePage!
  workstream(id: String!): workstream
  workstreams(where: workstreamFilter, orderBy: String, orderDirection: String, before: String, after: String, limit: Int, offset: Int): workstreamPage!
