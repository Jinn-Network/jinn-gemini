<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="lampBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35"/>
      <stop offset="50%" style="stop-color:#D4380D"/>
      <stop offset="100%" style="stop-color:#873800"/>
    </linearGradient>
    <linearGradient id="lampSpout" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D4380D"/>
      <stop offset="100%" style="stop-color:#FAAD14"/>
    </linearGradient>
    <linearGradient id="lampHandle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#873800"/>
      <stop offset="100%" style="stop-color:#531D00"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFC53D"/>
      <stop offset="100%" style="stop-color:#D48806"/>
    </linearGradient>
  </defs>
  
  <!-- Handle -->
  <path d="M120 220 Q60 220 60 280 Q60 340 120 340 L120 320 Q80 320 80 280 Q80 240 120 240 Z" fill="url(#lampHandle)"/>
  
  <!-- Lamp body -->
  <ellipse cx="256" cy="300" rx="150" ry="100" fill="url(#lampBody)"/>
  
  <!-- Spout -->
  <path d="M380 260 Q420 240 470 220 L470 240 Q420 260 390 280 Z" fill="url(#lampSpout)"/>
  
  <!-- Lid -->
  <ellipse cx="256" cy="210" rx="80" ry="30" fill="url(#lampBody)"/>
  
  <!-- Lid knob -->
  <circle cx="256" cy="170" r="20" fill="url(#lampBody)"/>
  
  <!-- Gold trim - base -->
  <ellipse cx="256" cy="400" rx="60" ry="20" fill="url(#gold)"/>
  
  <!-- Gold trim - lid -->
  <ellipse cx="256" cy="230" rx="70" ry="15" fill="url(#gold)"/>
  
  <!-- Highlight -->
  <ellipse cx="220" cy="270" rx="40" ry="60" fill="rgba(255,255,255,0.15)" transform="rotate(-20 220 270)"/>
</svg>
